name: mobile
description: CourtMate - Find your next tennis match.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.5.1       # StateNotifier + AsyncValue pattern
  riverpod_annotation: ^2.3.5    # Code-gen annotations (optional but clean)

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^13.2.0             # Declarative routing with redirect guards

  # ── HTTP & Networking ─────────────────────────────────────────
  dio: ^5.4.3                    # HTTP client with interceptor support
  pretty_dio_logger: ^1.3.1      # Logs request/response clearly (required for homework proof)

  # ── Secure Storage ────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0 # JWT storage — never use SharedPreferences for tokens

  # ── Serialization ─────────────────────────────────────────────
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1     # Immutable models with copyWith, equality

  # ── Utilities ─────────────────────────────────────────────────
  intl: ^0.20.2                  # Date formatting for matchDate (ISO8601 → display)
  equatable: ^2.0.5              # Value equality without boilerplate
  uuid: ^4.4.0                   # UUID generation on client side if needed

  # ── UI & UX ───────────────────────────────────────────────────
  google_fonts: ^6.2.1           # Matches web app typography
  cached_network_image: ^3.3.1   # Avatar/image caching
  shimmer: ^3.0.0                # Loading skeleton states
  flutter_animate: ^4.5.0        # Fluid micro-animations
  lottie: ^3.1.0                 # JSON animation for splash/empty states

  # ── Forms ─────────────────────────────────────────────────────
  reactive_forms: ^17.0.1        # Reactive form validation (cleaner than FormKey)


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true