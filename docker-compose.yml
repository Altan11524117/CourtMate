version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: courtmate_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: ${DB_NAME:-courtmate_db}
    ports:
      - "5432:5432"
    volumes:
      - courtmate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courtmate_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: courtmate_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courtmate_network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: courtmate_rabbitmq
    restart: always
    ports:
      - "5672:5672"   # RabbitMQ port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courtmate_network

  # Go Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courtmate_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Application Environment
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - GIN_MODE=${GIN_MODE:-debug}
      # Database Configuration
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-courtmate_db}
      - DB_PORT=5432
      # Server Configuration
      - PORT=8000
      # Security & Auth
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      # Frontend
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      # External APIs
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # RabbitMQ Configuration
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
    networks:
      - courtmate_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Jenkins CI/CD
  jenkins:
    image: jenkins/jenkins:lts-alpine
    container_name: courtmate_jenkins
    restart: always
    ports:
      - "8080:8080"   # Web UI
      - "50000:50000"  # Agent port
    environment:
      - JENKINS_OPTS=--httpPort=8080
      - TZ=UTC
    volumes:
      # Jenkins home directory
      - jenkins_home:/var/jenkins_home
      # Docker daemon socket for running docker commands inside Jenkins
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - rabbitmq
    networks:
      - courtmate_network
    # Allow jenkins to run docker commands
    user: "0"

networks:
  courtmate_network:
    driver: bridge

volumes:
  courtmate_pgdata:
  jenkins_home:
